<!-- ================= PAGE 1 (index.html) ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Gift</title>
  <style>
    body {
      margin: 0;
      font-family: cursive;
      font-style: italic;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    #mainContainer {
      text-align: center;
    }

    #openBtn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ff6f61;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ID: mainContainer (Main section) -->
  <div id="mainContainer">
    <h1>🎉 Click for a Birthday Surprise 🎉</h1>

    <!-- ID: openBtn (Button to go next page) -->
    <button id="openBtn" onclick="goToPage2()">Open Gift</button>
  </div>

  <script>
    function goToPage2() {
      window.location.href = "page2.html"; // Goes to Page 2
    }
  </script>
</body>
</html>


<!-- ================= PAGE 2 (page2.html) ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise</title>
  <style>
    body {
      margin: 0;
      font-family: cursive;
      font-style: italic;
      text-align: center;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      color: white;
      padding: 20px;
    }

    #heartIcon {
      font-size: 50px;
      color: red;
    }

    #cakeImage {
      width: 300px;
      border-radius: 20px;
      margin-top: 20px;
    }

    #nextBtn {
      margin-top: 30px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff6f61;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>❤️ Happy Birthday  </br>To MY LOVE Forever ❤️</h1>

  <!-- ID: heartIcon (Heart emoji section) -->
  <div id="heartIcon">💖</div>

  <!-- ID: cakeImage (Cake picture) -->
  <img id="cakeImage" src="https://images.unsplash.com/photo-1599785209707-28b9c5d74e04" alt="Cake">

  <br>

  <!-- ID: nextBtn (Go to next page) -->
  <button id="nextBtn" onclick="goToPage3()">Next</button>

  <script>
    function goToPage3() {
      window.location.href = "page3.html"; // Goes to Page 3
    }
  </script>
</body>
</html>


<!-- ================= PAGE 3 (page3.html) ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message</title>
  <style>
    body {
      margin: 0;
      font-family: cursive;
      font-style: italic;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      color: #333;
      padding: 20px;
    }

    #messageCard {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 600px;
      text-align: center;
    }

    #messageText {
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- ID: messageCard (Main message box) -->
  <div id="messageCard">
    <h2>🎂 A Special Message 🎂</h2>

    <!-- ID: messageText (Paragraph content) -->
    <p id="messageText">
      Wishing you a day filled with love, joy, and happiness. 
      May your smile shine bright and your dreams come true. 
      Have an amazing birthday! 🎉💖
    </p>
  </div>
</body>
</html>


<!-- ================= HOW TO UNDERSTAND ================= -->
<!--
1. Each important element has an ID (like openBtn, cakeImage, messageText).
2. IDs help you:
   - Style specific elements in CSS (#idName)
   - Control elements in JavaScript
3. Navigation works using window.location.href
4. Each page is separate but connected using buttons
-->
